<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Life Ultra IA</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui;}

body{
min-height:100vh;
background:linear-gradient(180deg,#064e3b,#042f2e);
color:white;
display:flex;
flex-direction:column;
transition:background .4s;
}

header{
display:flex;
align-items:center;
gap:12px;
padding:14px 18px;
background:rgba(0,0,0,.3);
}

header h3{font-size:18px;}

#time{
margin-left:auto;
background:rgba(0,0,0,.35);
padding:6px 14px;
border-radius:14px;
font-size:13px;
}

#topNav{
display:flex;
gap:12px;
padding:14px;
}

.navBox{
flex:1;
padding:18px 0;
background:rgba(255,255,255,.25);
border-radius:22px;
text-align:center;
font-weight:800;
cursor:pointer;
transition:.3s;
}

.navBox.active,
.navBox:hover{background:rgba(255,255,255,.45);}

.page{display:none;flex-direction:column;padding:14px;}
.page.active{display:flex;}

.card{
background:rgba(255,255,255,.2);
border-radius:22px;
padding:20px;
margin-bottom:16px;
}

input,select,button{
width:100%;
padding:14px;
border-radius:16px;
border:none;
font-size:15px;
}

button{
background:#38bdf8;
font-weight:700;
margin-top:10px;
cursor:pointer;
}

button:hover{background:#0ea5e9}

.task{
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(255,255,255,.3);
padding:12px;
border-radius:14px;
margin-top:8px;
}

#chatContainer{
height:55vh;
overflow-y:auto;
background:rgba(255,255,255,.15);
border-radius:20px;
padding:10px;
}

.message{
max-width:70%;
padding:10px 14px;
border-radius:18px;
margin:6px 0;
white-space:pre-line;
}

.userMsg{background:#38bdf8;color:black;margin-left:auto;}
.iaMsg{background:#22c55e;color:black;}

#iaInputArea{
display:flex;
gap:8px;
margin-top:10px;
align-items:center;
background:rgba(255,255,255,.15);
border-radius:30px;
padding:8px;
}

#iaInput{
flex:1;
background:transparent;
border:none;
color:white;
outline:none;
}

.iconBtn{
width:42px;height:42px;border-radius:50%;
display:flex;align-items:center;justify-content:center;
cursor:pointer;
background:#2f2f2f;color:white;
}

footer{
margin-top:auto;
padding:8px 14px;
font-size:12px;
text-align:right;
opacity:.7;
}
</style>
</head>

<body>

<header>
<h3>Daily Life Ultra IA</h3>
<div id="time"></div>
</header>

<div id="topNav">
<div class="navBox active" onclick="showPage('home',this)">Accueil</div>
<div class="navBox" onclick="showPage('ia',this)">IA</div>
<div class="navBox" onclick="showPage('promo',this)">Code Promo</div>
</div>

<div id="home" class="page active">
<div class="card">
<h3>🎨 Couleur</h3>
<select id="colorSelect">
<option value="#064e3b">Vert</option>
<option value="#3b82f6">Bleu</option>
<option value="#ef4444">Rouge</option>
</select>
</div>
</div>

<div id="ia" class="page">
<div id="chatContainer"></div>

<div id="iaInputArea">
<div class="iconBtn" onclick="fileInput.click()">+</div>
<input id="iaInput" placeholder="Écris un message…">
<div class="iconBtn" onclick="askIA()">➤</div>
<input type="file" id="fileInput" accept="image/*">
</div>
</div>

<div id="promo" class="page">
<div class="card">
<h3>🎁 Code Promo</h3>
<input id="promoInput">
<button onclick="validatePromo()">Valider</button>
<div id="promoResult"></div>
</div>
</div>

<footer>© 2026 Daily Life Ultra IA ⚡</footer>

<script>

setInterval(()=>time.textContent=new Date().toLocaleTimeString(),1000);

function showPage(id,el){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.getElementById(id).classList.add('active');
document.querySelectorAll('.navBox').forEach(b=>b.classList.remove('active'));
el.classList.add('active');
}

/* IA AMÉLIORÉE AVEC CONSEILS */

function askIA(){

const q=iaInput.value.trim();
if(!q) return;

chatContainer.innerHTML+=`<div class="message userMsg">${q}</div>`;

let text=q.toLowerCase();
let reply="";

/* SALUT */
if(text.includes("salut") || text.includes("yo")){
reply="Salut 😄 ça va ?";
}

/* CONSEILS */
else if(text.includes("conseil") || text.includes("aide") || text.includes("problème")){

if(text.includes("école") || text.includes("cours")){
reply="📚 Conseil : fais des petites sessions de travail (25 min) + pause. Tu retiens mieux 👍";
}

else if(text.includes("triste") || text.includes("mal")){
reply="💙 Parle à quelqu’un de confiance. Et prends du temps pour toi, c’est important.";
}

else if(text.includes("argent")){
reply="💰 Évite de dépenser sur des trucs inutiles et essaye de mettre un peu de côté chaque semaine.";
}

else{
reply="💡 Conseil : reste régulier, sois patient, et abandonne pas 👍";
}

}

/* QUI ES-TU */
else if(text.includes("t'es qui") || text.includes("tu es qui")){
reply="Je suis ton assistant IA 😎 je suis là pour t’aider dans tout !";
}

/* PAR DÉFAUT */
else{
reply="Hmm 🤔 explique-moi mieux, je veux comprendre.";
}

chatContainer.innerHTML+=`<div class="message iaMsg">${reply}</div>`;

iaInput.value="";
chatContainer.scrollTop=chatContainer.scrollHeight;

}

function validatePromo(){
promoResult.textContent=
promoInput.value==="PROMO2026"
? "Code valide"
: "Code invalide";
}

</script>

</body>
</html>
